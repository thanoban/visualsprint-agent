apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: visualsprint-agents
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      serviceAccountName: VISUALSPRINT_SERVICE_ACCOUNT_NAME
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/visualsprint/agents:latest
          ports:
            - containerPort: 8080
          env:
            - name: VISUALSPRINT_ENV
              value: production
            - name: VISUALSPRINT_TRACK
              value: elastic
            - name: VISUALSPRINT_AGENT_MODE
              value: configured_cloud
            - name: VISUALSPRINT_DEPLOYMENT_TARGET
              value: cloud_run
            - name: VISUALSPRINT_AGENT_RUNTIME_BACKEND
              value: vertex_ai_reasoning_engine
            - name: VISUALSPRINT_GOOGLE_CLOUD_PROJECT_ID
              value: PROJECT_ID
            - name: VISUALSPRINT_GOOGLE_CLOUD_LOCATION
              value: us-central1
            - name: VISUALSPRINT_AGENT_APPLICATION_ID
              value: VISUALSPRINT_AGENT_APP_ID
            - name: VISUALSPRINT_REASONING_ENGINE_RESOURCE_NAME
              value: projects/PROJECT_NUMBER/locations/us-central1/reasoningEngines/REASONING_ENGINE_ID
            - name: VISUALSPRINT_SUMMARY_ENGINE_RESOURCE_NAME
              value: projects/PROJECT_NUMBER/locations/us-central1/reasoningEngines/SUMMARY_ENGINE_ID
            - name: VISUALSPRINT_CLOUD_RUN_SERVICE_URL
              value: https://visualsprint-agents-REPLACE.a.run.app
            - name: VISUALSPRINT_SERVICE_ACCOUNT_EMAIL
              value: visualsprint-agents@PROJECT_ID.iam.gserviceaccount.com
            - name: VISUALSPRINT_ALLOWED_ORIGINS
              value: https://app.visualsprint.dev
            - name: VISUALSPRINT_AGENT_REQUEST_TIMEOUT_SECONDS
              value: "4.0"
